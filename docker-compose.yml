services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URI: postgresql://leine_honig:${POSTGRES_PASSWORD}@postgres:5432/leine_honig
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
    volumes:
      - media:/app/public/media
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: leine_honig
      POSTGRES_USER: leine_honig
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leine_honig"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  media:
